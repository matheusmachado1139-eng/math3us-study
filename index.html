<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>M@th3us Study</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#43e97b);
color:white;
text-align:center;
}

.screen{display:none;padding:20px;animation:fade 0.5s;}
.active{display:block;}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

button{
padding:12px;
margin:8px;
border:none;
border-radius:15px;
background:yellow;
font-weight:bold;
transition:0.2s;
}

button:hover{transform:scale(1.1);}
button:active{transform:scale(0.9);}

.card{
background:rgba(255,255,255,0.2);
padding:15px;
margin:10px;
border-radius:15px;
}

h1{margin-top:30px;}
</style>
</head>

<body>

<div id="home" class="screen active">
<h1>M@th3us Study</h1>
<p>Aprenda de forma divertida 🎮</p>
<button onclick="show('setup')">Começar</button>
</div>

<div id="setup" class="screen">
<h2>Configurar Estudo</h2>

<p>Escolha a matéria:</p>
<button onclick="setSubject('Matemática')">Matemática</button>
<button onclick="setSubject('Português')">Português</button>
<button onclick="setSubject('História')">História</button>
<button onclick="setSubject('Ciências')">Ciências</button>
<button onclick="setSubject('Geografia')">Geografia</button>
<button onclick="setSubject('Inglês')">Inglês</button>

<p>Escolha a série:</p>
<button onclick="setLevel(1)">1º ano</button>
<button onclick="setLevel(2)">2º ano</button>
<button onclick="setLevel(3)">3º ano</button>

<br><br>
<button onclick="goStudy()">Continuar</button>
</div>

<div id="menu" class="screen">
<h2 id="info"></h2>

<button onclick="showExplanation()">📚 Aprender</button>
<button onclick="startQuiz()">🎯 Quiz</button>
</div>

<div id="explain" class="screen">
<h2>Explicação</h2>
<div class="card" id="text"></div>
<button onclick="show('menu')">Voltar</button>
</div>

<div id="quiz" class="screen">
<h2 id="question"></h2>
<div id="answers"></div>
<p id="feedback"></p>
</div>

<script>

let subject="";
let level=1;

function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function setSubject(s){subject=s;}
function setLevel(l){level=l;}

function goStudy(){
document.getElementById("info").innerText=subject+" - "+level+"º ano";
show("menu");
}

function showExplanation(){
let text="";

if(subject==="Matemática"){
text="Matemática envolve números e operações. Quanto maior a série, mais difícil!";
}
if(subject==="Português"){
text="Português estuda frases, palavras e textos.";
}
if(subject==="História"){
text="História estuda o passado.";
}
if(subject==="Ciências"){
text="Ciências explica o mundo e o corpo humano.";
}
if(subject==="Geografia"){
text="Geografia fala sobre mapas e territórios.";
}
if(subject==="Inglês"){
text="Inglês é uma língua internacional. Hello = Olá";
}

document.getElementById("text").innerText=text;
show("explain");
}

let questions={
Matemática:[
[{q:"1+1?",a:["1","2","3","4"],c:1}],
[{q:"5x2?",a:["10","7","8","9"],c:0}],
[{q:"12/3?",a:["3","4","5","6"],c:1}]
],
Português:[
[{q:"Plural de cão?",a:["cães","cãos","cao","caes"],c:0}],
[{q:"Verbo correr?",a:["ação","objeto","lugar","nome"],c:0}],
[{q:"Adjetivo?",a:["bonito","correr","cidade","mesa"],c:0}]
]
};

let current=0;

function startQuiz(){
current=0;
show("quiz");
loadQ();
}

function loadQ(){
let q=questions[subject][level-1][current];
document.getElementById("question").innerText=q.q;

let div=document.getElementById("answers");
div.innerHTML="";

q.a.forEach((ans,i)=>{
let b=document.createElement("button");
b.innerText=ans;
b.onclick=()=>check(i);
div.appendChild(b);
});
}

function check(i){
let q=questions[subject][level-1][current];

if(i===q.c){
document.getElementById("feedback").innerText="Correto! 🎉";
}else{
document.getElementById("feedback").innerText="Errado 😢";
}

setTimeout(()=>show("menu"),1000);
}

</script>

</body>
  </html>
